<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="820" height="560" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Illuminated Momentary Switch — Wiring Diagram</text>
  <text x="410" y="55" text-anchor="middle" fill="#888" font-size="11">Okai BMS Display · Board_Wiring.md § External Waterproof Buttons</text>

  <!-- ═══════════════════════════════════════════════════════════
       SWITCH BODY (centre)
  ════════════════════════════════════════════════════════════ -->

  <!-- outer ring / bezel -->
  <circle cx="410" cy="280" r="82" fill="none" stroke="#555" stroke-width="6"/>
  <!-- body fill -->
  <circle cx="410" cy="280" r="76" fill="#2a2a3e"/>
  <!-- LED glow ring -->
  <circle cx="410" cy="280" r="68" fill="none" stroke="#00aaff" stroke-width="3" opacity="0.6"/>
  <!-- inner button cap -->
  <circle cx="410" cy="280" r="55" fill="#3a3a5e"/>
  <circle cx="410" cy="280" r="48" fill="#4a4a6e"/>
  <!-- LED indicator dot in cap -->
  <circle cx="410" cy="280" r="14" fill="#00aaff" opacity="0.85"/>
  <circle cx="410" cy="280" r="9"  fill="#80d8ff"/>
  <!-- button label -->
  <text x="410" y="320" text-anchor="middle" fill="#aaa" font-size="10">8 mm switch</text>
  <text x="410" y="333" text-anchor="middle" fill="#aaa" font-size="10">w/ LED ring</text>

  <!-- Pin stubs at bottom of switch body -->
  <!-- 4 pins spaced across, extending downward from bezel bottom -->
  <!-- Pin order (left→right): LED−  COM  NO  LED+ -->

  <!-- LED− pin (leftmost) -->
  <line x1="340" y1="358" x2="340" y2="400" stroke="#666" stroke-width="3"/>
  <circle cx="340" cy="400" r="5" fill="#aaa"/>
  <text x="340" y="420" text-anchor="middle" fill="#aaa" font-size="11" font-weight="bold">LED−</text>
  <text x="340" y="434" text-anchor="middle" fill="#888" font-size="10">(cathode)</text>

  <!-- COM pin -->
  <line x1="380" y1="358" x2="380" y2="400" stroke="#666" stroke-width="3"/>
  <circle cx="380" cy="400" r="5" fill="#aaa"/>
  <text x="380" y="420" text-anchor="middle" fill="#aaa" font-size="11" font-weight="bold">COM</text>

  <!-- NO pin -->
  <line x1="440" y1="358" x2="440" y2="400" stroke="#666" stroke-width="3"/>
  <circle cx="440" cy="400" r="5" fill="#aaa"/>
  <text x="440" y="420" text-anchor="middle" fill="#aaa" font-size="11" font-weight="bold">NO</text>

  <!-- LED+ pin (rightmost) -->
  <line x1="480" y1="358" x2="480" y2="400" stroke="#666" stroke-width="3"/>
  <circle cx="480" cy="400" r="5" fill="#aaa"/>
  <text x="480" y="420" text-anchor="middle" fill="#aaa" font-size="11" font-weight="bold">LED+</text>
  <text x="480" y="434" text-anchor="middle" fill="#888" font-size="10">(anode)</text>

  <!-- also show top connector stubs -->
  <!-- 2 top pins for the switch contacts (NO/COM can also be top-mounted depending on variant) -->

  <!-- ═══════════════════════════════════════════════════════════
       LEFT SIDE — GPIO SIGNAL (orange)  → NO contact
  ════════════════════════════════════════════════════════════ -->

  <!-- ESP32-S3 GPIO block -->
  <rect x="30" y="240" width="130" height="80" rx="6" fill="#1e3a2e" stroke="#2ecc71" stroke-width="2"/>
  <text x="95" y="262" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">ESP32-S3</text>
  <text x="95" y="280" text-anchor="middle" fill="#aaa" font-size="11">GPIO 0 / 14 / 21</text>
  <text x="95" y="295" text-anchor="middle" fill="#888" font-size="10">INPUT_PULLUP</text>
  <text x="95" y="310" text-anchor="middle" fill="#888" font-size="10">active-LOW</text>

  <!-- wire: GPIO right edge → NO pin -->
  <!-- GPIO block right edge is x=160, y=280 -->
  <line x1="160" y1="280" x2="280" y2="280" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="none"/>
  <!-- bend down to NO pin level -->
  <line x1="280" y1="280" x2="280" y2="400" stroke="#e67e22" stroke-width="2.5"/>
  <!-- horizontal to NO pin -->
  <line x1="280" y1="400" x2="435" y2="400" stroke="#e67e22" stroke-width="2.5"/>

  <!-- label on orange wire -->
  <rect x="180" y="265" width="72" height="18" rx="3" fill="#2a1a0a"/>
  <text x="216" y="278" text-anchor="middle" fill="#e67e22" font-size="10">GPIO signal</text>

  <!-- ═══════════════════════════════════════════════════════════
       GND — COM pin  &  LED− pin  (black wire)
  ════════════════════════════════════════════════════════════ -->

  <!-- GND rail on left bottom -->
  <rect x="30" y="460" width="80" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
  <text x="70" y="481" text-anchor="middle" fill="#ccc" font-size="13" font-weight="bold">GND</text>
  <text x="70" y="492" text-anchor="middle" fill="#888" font-size="10">common</text>

  <!-- wire GND block right → COM pin  -->
  <line x1="110" y1="478" x2="200" y2="478" stroke="#888" stroke-width="2.5"/>
  <!-- up to COM height -->
  <line x1="200" y1="478" x2="200" y2="410" stroke="#888" stroke-width="2.5"/>
  <!-- right to COM -->
  <line x1="200" y1="410" x2="375" y2="410" stroke="#888" stroke-width="2.5"/>
  <!-- down to COM pin top -->
  <line x1="375" y1="410" x2="375" y2="400" stroke="#888" stroke-width="2.5"/>

  <!-- LED− to GND: LED− pin (340,400) → left to same GND rail -->
  <line x1="340" y1="400" x2="340" y2="460" stroke="#888" stroke-width="2.5"/>
  <line x1="110" y1="460" x2="340" y2="460" stroke="#888" stroke-width="2.5"/>
  <!-- connect that horizontal to GND block top -->
  <line x1="110" y1="460" x2="110" y2="478" stroke="#888" stroke-width="2.5"/>

  <!-- GND label on wire near COM -->
  <rect x="160" y="397" width="30" height="16" rx="2" fill="#1a1a1a"/>
  <text x="175" y="409" text-anchor="middle" fill="#aaa" font-size="10">GND</text>

  <!-- ═══════════════════════════════════════════════════════════
       RIGHT SIDE — 5V rail  → 150Ω  → LED+  (red)
  ════════════════════════════════════════════════════════════ -->

  <!-- 5V source block -->
  <rect x="660" y="100" width="120" height="60" rx="6" fill="#3a1a1a" stroke="#e74c3c" stroke-width="2"/>
  <text x="720" y="125" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">5V Rail</text>
  <text x="720" y="143" text-anchor="middle" fill="#888" font-size="10">VESC power rail</text>

  <!-- wire from 5V block down to resistor -->
  <!-- 5V block left edge x=660, y=130 -->
  <line x1="660" y1="130" x2="600" y2="130" stroke="#e74c3c" stroke-width="2.5"/>
  <!-- down to resistor level -->
  <line x1="600" y1="130" x2="600" y2="210" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- 150Ω Resistor symbol -->
  <!-- Resistor body at (560,210)→(640,210), centred on x=600 -->
  <line x1="600" y1="210" x2="560" y2="210" stroke="#e74c3c" stroke-width="2.5"/>
  <rect x="560" y="200" width="80" height="20" rx="4" fill="#2a1a0a" stroke="#e67e22" stroke-width="2"/>
  <text x="600" y="214" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">150 Ω</text>
  <line x1="640" y1="210" x2="680" y2="210" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- right of resistor: continue down to LED+ pin level -->
  <line x1="680" y1="210" x2="680" y2="400" stroke="#e74c3c" stroke-width="2.5"/>
  <!-- left to LED+ pin -->
  <line x1="680" y1="400" x2="485" y2="400" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- labels on red wire -->
  <rect x="618" y="145" width="64" height="16" rx="2" fill="#1a0a0a"/>
  <text x="650" y="157" text-anchor="middle" fill="#e74c3c" font-size="10">+5V  ~20mA</text>
  <rect x="618" y="225" width="82" height="16" rx="2" fill="#1a0a0a"/>
  <text x="659" y="237" text-anchor="middle" fill="#e67e22" font-size="10">after resistor</text>

  <!-- ═══════════════════════════════════════════════════════════
       ANNOTATION BOX — top left
  ════════════════════════════════════════════════════════════ -->

  <rect x="30" y="80" width="220" height="135" rx="6" fill="#12121f" stroke="#444" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Switch contacts</text>
  <line x1="40" y1="107" x2="240" y2="107" stroke="#444" stroke-width="1"/>
  <text x="40" y="122" fill="#aaa" font-size="10">NO  → GPIO (INPUT_PULLUP)</text>
  <text x="40" y="137" fill="#aaa" font-size="10">COM → GND (common)</text>
  <text x="40" y="155" fill="#888" font-size="10">Press = GPIO pulled LOW</text>
  <text x="40" y="170" fill="#888" font-size="10">Release = internal pull-up → HIGH</text>
  <text x="40" y="188" fill="#2ecc71" font-size="10">No external pull-up resistor needed</text>

  <rect x="30" y="330" width="220" height="120" rx="6" fill="#12121f" stroke="#444" stroke-width="1.5"/>
  <text x="140" y="350" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">LED ring</text>
  <line x1="40" y1="357" x2="240" y2="357" stroke="#444" stroke-width="1"/>
  <text x="40" y="372" fill="#aaa" font-size="10">LED+ → 150Ω → 5V rail</text>
  <text x="40" y="387" fill="#aaa" font-size="10">LED− → GND</text>
  <text x="40" y="405" fill="#888" font-size="10">~20 mA  (Vf ≈ 2.0V blue/green)</text>
  <text x="40" y="422" fill="#888" font-size="10">Always-on — no GPIO needed</text>
  <text x="40" y="437" fill="#00aaff" font-size="10">Glows whenever system is powered</text>

  <!-- ═══════════════════════════════════════════════════════════
       BUTTON ASSIGNMENT TABLE — bottom right
  ════════════════════════════════════════════════════════════ -->

  <rect x="550" y="340" width="240" height="140" rx="6" fill="#12121f" stroke="#444" stroke-width="1.5"/>
  <text x="670" y="360" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Pin Assignments</text>
  <line x1="560" y1="367" x2="780" y2="367" stroke="#444" stroke-width="1"/>
  <text x="560" y="382" fill="#888" font-size="10">Button  GPIO   Pad / Header</text>
  <line x1="560" y1="387" x2="780" y2="387" stroke="#333" stroke-width="1"/>
  <text x="560" y="402" fill="#2ecc71" font-size="10">BTN1    GPIO 0   Boot button pads</text>
  <text x="560" y="417" fill="#2ecc71" font-size="10">BTN2    GPIO 14  BTN2 pads</text>
  <text x="560" y="432" fill="#2ecc71" font-size="10">BTN3    GPIO 21  Header pin</text>
  <line x1="560" y1="440" x2="780" y2="440" stroke="#333" stroke-width="1"/>
  <text x="560" y="455" fill="#888" font-size="10">Solder 28 AWG from PCB pad</text>
  <text x="560" y="468" fill="#888" font-size="10">→ external switch terminal</text>

  <!-- ═══════════════════════════════════════════════════════════
       VERSION / SOURCE footnote
  ════════════════════════════════════════════════════════════ -->
  <text x="410" y="545" text-anchor="middle" fill="#555" font-size="10">Okai BMS Display v0.1.0 · docs/Switch_Wiring.svg · ref: Board_Wiring.md</text>

</svg>
